name: My First Github Workflow
run-name: Run message by @${{ github.actor }}
on: workflow_dispatch
env:
  Name: 'Sunil Kumar'
jobs:
  my_first_job:
    name: deploy to staging
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Greeting
        run: |
          echo "Hello World!!!Good Morning" 
          echo "This workflow run By $Name"
      - name: Print message
        run: echo "Hello from self-hosted GitHub Actions runner"
  my_second_job:
     name: deploy to dev 
     runs-on: ubuntu-latest
     needs: my_first_job
     continue-on-error: true
     steps:
       - name: Print message
         run: echo "Hello Ubuntu-latest"
  my_third_job:
    name: deploy to prod
    runs-on: windows-latest
    needs: my_second_job
    env:
      COUNTRY: "India"
      MESSAGE: "Good Morning"
    steps:
      - name: Print Message
       run: |
          Write-Host "Hello $env:COUNTRY"
          Write-Host "$env:MESSAGE from Windows Runner""
         
   
