name: My First Github Workflow
run-name: Run message by @${{ github.actor }}
on: workflow_dispatch
jobs:
  my_first_job:
    name: deploy to staging
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Greeting
        run: echo "Hello World!!!Good Morning" 
      - name: Print message
        run: echo "Hello from self-hosted GitHub Actions runner"
   my_second_job:
     name: deploy to dev 
     runs-on: ubuntu-latest
     needs: my_first_job
     steps:
       - name: Print message
         run: "Hello Ubuntu-latest"
         
   
